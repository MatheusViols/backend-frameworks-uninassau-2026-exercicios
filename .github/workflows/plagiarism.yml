name: 🔍 Detector de Plágio

on:
  pull_request:
    branches: [ main ]

jobs:
  plagiarism-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout all PRs
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔍 Analisar similaridade
        id: check
        run: |
          # Detectar exercícios modificados
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | grep '^exercicio-')
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "⚠️ Nenhum exercício modificado detectado"
            echo "suspicious=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "📝 Arquivos modificados:"
          echo "$CHANGED_FILES"
          
          # Simulação de detector (em produção, usar ferramenta real)
          SIMILARITY=0
          SUSPICIOUS=false
          
          # Buscar por padrões suspeitos
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              # Verificar comentários excessivos
              COMMENT_LINES=$(grep -c '//' "$file" || echo 0)
              TOTAL_LINES=$(wc -l < "$file")
              
              if [ $TOTAL_LINES -gt 10 ]; then
                COMMENT_RATIO=$((COMMENT_LINES * 100 / TOTAL_LINES))
                
                if [ $COMMENT_RATIO -gt 50 ]; then
                  echo "⚠️ Arquivo $file tem muitos comentários ($COMMENT_RATIO%)"
                  SUSPICIOUS=true
                fi
              fi
            fi
          done
          
          echo "similarity=${SIMILARITY}" >> $GITHUB_OUTPUT
          echo "suspicious=${SUSPICIOUS}" >> $GITHUB_OUTPUT

      - name: 💬 Comentar se suspeito
        if: steps.check.outputs.suspicious == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `## ⚠️ Análise de Similaridade
            
            Foi detectado um padrão suspeito em seu código que requer revisão manual.
            
            #### Possíveis causas:
            - Excesso de comentários em relação ao código
            - Similaridade alta com outras submissões
            - Código formatado de forma incomum
            
            #### Próximos passos:
            1. O professor será notificado para revisão manual
            2. Se for identificado plágio, o exercício será invalidado
            3. Reincidência pode resultar em penalidades acadêmicas
            
            ---
            
            💡 **Lembre-se:** É permitido consultar documentação e tutoriais, mas **não copie código de outros alunos**.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
            
            // Adicionar label
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['🔍 revisão-manual']
            });
